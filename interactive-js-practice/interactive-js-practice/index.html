<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f6f8;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .product {
        background: #fff;
        border-radius: 16px;
        padding: 32px;
        width: 280px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .product h3 {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
      }

      .add-to-cart {
        width: 100%;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .add-to-cart:hover {
        background: #2563eb;
      }

      .add-to-cart:active {
        background: #1d4ed8;
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div
      class="product"
      data-product-id="123"
      data-product-name="노트북"
      data-price="1200000"
    >
      <h3>노트북</h3>
      <button class="add-to-cart">장바구니 담기</button>
    </div>
    <script>
      const buttons = document.querySelectorAll(".add-to-cart");

      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const product = e.target.closest(".product");

          const cartItem = {
            id: product.dataset.productId,
            name: product.dataset.productName,
            price: product.dataset.price,
          };

          console.log("장바구니에 추가:", cartItem);
        });
      });
    </script>
  </body>
</html>
