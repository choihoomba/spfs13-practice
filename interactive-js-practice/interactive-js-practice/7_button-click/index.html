<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>버튼 클릭 이벤트</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 20px;
        background-color: #f5f5f5;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
      }

      h1 {
        color: #333;
        margin-bottom: 20px;
      }

      .section {
        margin-bottom: 40px;
        padding: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
      }

      .section h2 {
        margin-bottom: 12px;
        color: #667eea;
      }

      /* 카운터 스타일 */
      .counter-area {
        display: flex;
        align-items: center;
        gap: 20px;
        margin: 16px 0;
      }

      .count-display {
        font-size: 48px;
        font-weight: bold;
        color: #667eea;
        min-width: 80px;
        text-align: center;
      }

      /* 결과 표시 영역 */
      .result-box {
        min-height: 60px;
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 16px;
        margin: 16px 0;
        line-height: 1.8;
      }

      /* 색상 박스 */
      .color-box {
        width: 200px;
        height: 200px;
        background-color: #667eea;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        font-weight: bold;
        margin: 16px 0;
        transition: background-color 0.3s;
      }

      /* 좋아요 버튼 */
      .like-area {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
      }

      .like-btn {
        font-size: 24px;
        padding: 8px 16px;
        border: 2px solid #ddd;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        transition: all 0.2s;
      }

      .like-btn.liked {
        border-color: #e74c3c;
        background-color: #fff5f5;
      }

      .like-count {
        font-size: 20px;
        font-weight: bold;
        color: #333;
      }

      /* 알림 메시지 */
      .notification-area {
        margin: 16px 0;
      }

      .notification {
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 8px;
        background-color: #d1ecf1;
        color: #0c5460;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .notification .close-btn {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: #0c5460;
        padding: 0 4px;
      }

      button {
        padding: 10px 20px;
        margin: 5px;
        background-color: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background-color: #5568d3;
      }

      .btn-group {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>버튼 클릭 이벤트</h1>

      <!-- 섹션 1: 기본 addEventListener -->
      <div class="section">
        <h2>섹션 1: 기본 클릭 이벤트</h2>
        <div class="result-box" id="result1">여기에 결과가 표시됩니다.</div>
        <button id="btn-hello">인사하기</button>
      </div>

      <!-- 섹션 2: 카운터 -->
      <div class="section">
        <h2>섹션 2: 카운터</h2>
        <div class="counter-area">
          <button id="btn-minus">-</button>
          <div class="count-display" id="count">0</div>
          <button id="btn-plus">+</button>
        </div>
      </div>

      <!-- 섹션 3: 여러 이벤트 등록 -->
      <div class="section">
        <h2>섹션 3: 여러 이벤트 동시 등록</h2>
        <div class="result-box" id="result3">버튼을 클릭하면 두 가지 동작이 동시에 실행됩니다.</div>
        <button id="btn-multi">클릭하면 두 가지 일이!</button>
      </div>

      <!-- 섹션 4: 색상 변경 -->
      <div class="section">
        <h2>섹션 4: 색상 랜덤 변경</h2>
        <div class="color-box" id="color-box">색상 박스</div>
        <button id="btn-color">색상 변경</button>
      </div>

      <!-- 섹션 5: 좋아요 토글 -->
      <div class="section">
        <h2>섹션 5: 좋아요 토글</h2>
        <div class="like-area">
          <button class="like-btn" id="like-btn">🤍</button>
          <span class="like-count" id="like-count">0</span>
        </div>
      </div>

      <!-- 섹션 6: 한 번만 실행 (once) -->
      <div class="section">
        <h2>섹션 6: 한 번만 실행</h2>
        <div class="result-box" id="result6">쿠폰 버튼은 한 번만 클릭할 수 있습니다.</div>
        <button id="btn-coupon">쿠폰 받기</button>
      </div>

      <!-- 섹션 7: 이벤트 제거 (removeEventListener) -->
      <div class="section">
        <h2>섹션 7: 이벤트 제거</h2>
        <div class="notification-area" id="notification-area">
          <div class="notification">
            <span>새로운 메시지가 도착했습니다.</span>
            <button class="close-btn">✕</button>
          </div>
          <div class="notification">
            <span>업데이트가 완료되었습니다.</span>
            <button class="close-btn">✕</button>
          </div>
          <div class="notification">
            <span>일정이 추가되었습니다.</span>
            <button class="close-btn">✕</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
