<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM 트리 탐색</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 20px;
        background-color: #f5f5f5;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
      }

      .menu {
        border: 2px solid #667eea;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .menu-item {
        padding: 15px 20px;
        border-bottom: 1px solid #e0e0e0;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .menu-item:last-child {
        border-bottom: none;
      }

      .menu-item:hover {
        background-color: #f0f0f0;
      }

      .menu-item.active {
        background-color: #667eea;
        color: white;
      }

      button {
        padding: 10px 20px;
        margin: 5px;
        background-color: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background-color: #5568d3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>DOM 트리 탐색 연습</h1>

      <!-- 메뉴 구조 -->
      <div class="menu" id="main-menu">
        <div class="menu-item" id="item1">메뉴 1</div>
        <div class="menu-item" id="item2">메뉴 2</div>
        <div class="menu-item active" id="item3">메뉴 3 (활성)</div>
        <div class="menu-item" id="item4">메뉴 4</div>
        <div class="menu-item" id="item5">메뉴 5</div>
      </div>

      <!-- 테스트 버튼들 -->
      <div>
        <button onclick="test1()">부모 찾기</button>
        <button onclick="test2()">자식 찾기</button>
        <button onclick="test3()">형제 찾기</button>
        <button onclick="test4()">조상 찾기 (closest)</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
